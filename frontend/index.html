<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>You Vs Many — Debate Showrunner</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  :root{
    --bg:#0b0d11; --bg-soft:#101319; --panel:#14181f; --panel-2:#1a1f29;
    --border:#262d3a; --border-soft:#1e2530;
    --text:#e9ecf2; --muted:#97a1b2; --faint:#6b7585;
    --accent:#7b97ff; --accent-soft:rgba(123,151,255,.13); --accent-bd:rgba(123,151,255,.4);
    --glow:#f2f5ff;
    --ok:#5dcaa5; --ok-soft:rgba(93,202,165,.12);
    --warn:#efbf4f; --bad:#e2756f;
    --radius:14px; --radius-sm:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);
    -webkit-font-smoothing:antialiased;line-height:1.55;font-size:15px}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 22px 80px}

  /* header / brand */
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:6px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{display:flex;align-items:center;gap:2px;font-weight:800;letter-spacing:.04em;
    font-size:30px;line-height:1;color:var(--glow);text-shadow:0 0 22px rgba(220,230,255,.18)}
  .logo .vs{color:var(--muted);font-weight:700;margin:0 2px}
  .logo svg{display:block;margin:0 1px}
  .tag{color:var(--muted);font-size:13.5px;margin:2px 0 0 2px}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);padding:7px 12px;border-radius:999px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .pill.live .dot{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .pill b{color:var(--text);font-weight:600}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
  .card + .card{margin-top:18px}
  .lbl{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 0 8px}

  input[type=text],input[type=number]{width:100%;background:var(--bg-soft);border:1px solid var(--border);
    color:var(--text);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;font-family:inherit;outline:none}
  input[type=text]:focus,input[type=number]:focus{border-color:var(--accent-bd);box-shadow:0 0 0 3px var(--accent-soft)}
  input::placeholder{color:var(--faint)}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{cursor:pointer;font-size:13px;color:var(--muted);background:var(--bg-soft);
    border:1px solid var(--border);border-radius:999px;padding:7px 13px;transition:.15s}
  .chip:hover{border-color:var(--accent-bd);color:var(--text)}
  .chip .k{color:var(--faint);font-size:11px;margin-left:6px}
  .chip.factual{border-style:dashed}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:18px}
  .seg{display:flex;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{flex:1;background:transparent;border:0;color:var(--muted);padding:11px 8px;font-size:14px;
    font-family:inherit;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--accent-soft);color:var(--text);box-shadow:inset 0 0 0 1px var(--accent-bd)}
  .stepper{display:flex;align-items:center;justify-content:space-between;background:var(--bg-soft);
    border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px}
  .stepper button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--panel-2);
    color:var(--text);font-size:18px;cursor:pointer;line-height:1}
  .stepper b{font-size:17px}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .rangerow{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:2px}
  .rangerow b{color:var(--text)}

  .runbar{display:flex;align-items:center;gap:14px;margin-top:20px}
  .run{appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;
    color:#0b0d11;background:linear-gradient(180deg,#a9bcff,#7b97ff);padding:13px 26px;border-radius:11px;
    box-shadow:0 6px 22px rgba(123,151,255,.28);transition:.15s}
  .run:hover{filter:brightness(1.06)}
  .run:disabled{opacity:.6;cursor:default;box-shadow:none}
  .runbar .hint{color:var(--faint);font-size:13px}
  .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#0b0d11;
    border-radius:50%;display:inline-block;vertical-align:-3px;margin-right:8px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  #results{margin-top:22px;display:none}
  .statusrow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px}
  .badge{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
  .badge.state{background:var(--accent-soft);color:#bccbff;border-color:var(--accent-bd)}
  .badge.ok{background:var(--ok-soft);color:#8fe6c8;border-color:rgba(93,202,165,.4)}
  .badge.no{background:rgba(226,117,111,.12);color:#f0a39e;border-color:rgba(226,117,111,.4)}
  .badge.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--faint)}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .metric{background:var(--panel-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px 16px}
  .metric .m-l{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
  .metric .m-v{font-size:25px;font-weight:700;margin-top:5px}
  .metric .m-v.small{font-size:18px}
  .bar{height:5px;border-radius:3px;background:var(--bg-soft);margin-top:9px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:3px;background:var(--accent)}

  h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);
    font-weight:600;margin:26px 0 12px}

  .cast{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .pc{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 15px;
    border-left:3px solid var(--c,var(--faint))}
  .pc .role{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)}
  .pc .nm{font-weight:700;font-size:16px;margin:3px 0 6px}
  .pc .ct{display:inline-block;font-size:11.5px;color:var(--c,var(--muted));background:var(--bg-soft);
    border:1px solid var(--border);border-radius:999px;padding:3px 9px}
  .pc .cc{color:var(--muted);font-size:13px;margin-top:9px;line-height:1.5}

  .turn{display:flex;margin:14px 0;gap:12px}
  .turn.right{flex-direction:row-reverse}
  .turn.center{justify-content:center}
  .av{flex:0 0 38px;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;color:#0b0d11;background:var(--c,#3a4250)}
  .bubble{max-width:76%;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:11px 15px}
  .turn.right .bubble{background:var(--accent-soft);border-color:var(--accent-bd)}
  .turn.center .bubble{max-width:90%;background:var(--bg-soft);border-style:dashed;color:var(--muted);text-align:center}
  .b-top{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap}
  .b-top .who{font-weight:700;font-size:13.5px;color:var(--c,var(--text))}
  .b-top .ct{font-size:11px;color:var(--muted);background:var(--bg-soft);border:1px solid var(--border);
    border-radius:999px;padding:2px 8px}
  .b-txt{font-size:14.5px;line-height:1.6}
  .b-foot{margin-top:8px;font-size:11.5px;color:var(--faint);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    display:flex;gap:12px;flex-wrap:wrap}

  /* Surrounded-style ritual beats */
  .claimcard{margin:26px 0 6px;padding:15px 18px;border-radius:var(--radius);
    background:linear-gradient(180deg,var(--accent-soft),transparent);
    border:1px solid var(--accent-bd);border-left:3px solid var(--accent)}
  .claimcard .ix{font-size:11px;text-transform:uppercase;letter-spacing:0;color:#bccbff;font-weight:700}
  .claimcard .who{color:var(--faint);font-weight:600}
  .claimcard .ctxt{font-size:16px;font-weight:600;color:var(--glow);margin-top:5px;line-height:1.45}
  .votedout{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 4px}
  .votedout .ritual{font-size:12.5px;color:var(--warn);background:rgba(239,191,79,.08);
    border:1px dashed rgba(239,191,79,.45);border-radius:var(--radius-sm);padding:6px 14px}
  .votedout .ritual b{color:var(--text);font-weight:600}
  .seatline{flex:1;height:1px;background:var(--border-soft);max-width:90px}

  .hl{display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);padding:12px 15px;margin-bottom:10px}
  .hl .rng{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:var(--muted);flex:0 0 auto}
  .hl .htag{font-size:12px;color:var(--text);background:var(--bg-soft);border:1px solid var(--border);
    border-radius:999px;padding:3px 10px}
  .hl .hscore{margin-left:auto;display:flex;align-items:center;gap:10px;min-width:160px}
  .hl .hscore .bar{flex:1;margin:0}
  .hl .hscore b{font-variant-numeric:tabular-nums;font-size:13px}

  .report{display:flex;flex-wrap:wrap;gap:10px 22px;color:var(--muted);font-size:13px;margin-top:6px}
  .report b{color:var(--text);font-weight:600}
  .report .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

  /* Phase 2 — scene manifest */
  .setcard{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:var(--radius-sm);padding:12px 15px;margin:4px 0 12px}
  .setcard .setname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .setcard .setname .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;
    color:var(--faint);font-weight:400}
  .setcard .setenv{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.5}
  .voices{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .voice{font-size:12px;color:var(--muted);background:var(--bg-soft);border:1px solid var(--border);
    border-left:3px solid var(--c,var(--faint));border-radius:6px;padding:4px 10px}
  .voice b{color:var(--c,var(--text));font-weight:600}
  .stage{position:relative;height:140px;background:radial-gradient(120% 90% at 50% 100%,var(--accent-soft),transparent 70%);
    border:1px solid var(--border);border-radius:var(--radius-sm);margin:6px 0 14px;overflow:hidden}
  .stage .cam-label{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);font-size:10.5px;
    text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .mark{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px}
  .mark .dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#0b0d11;background:var(--c,#3a4250);box-shadow:0 0 0 3px rgba(0,0,0,.25)}
  .mark .ml{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .timeline{display:flex;height:26px;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin:6px 0 16px}
  .timeline .blk{height:100%;min-width:2px;opacity:.85}
  .timeline .blk.cap{background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.12) 3px,rgba(255,255,255,.12) 6px)}
  .shot{display:flex;align-items:center;gap:11px;background:var(--panel-2);border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:7px}
  .shot .sid{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--faint);flex:0 0 116px}
  .shot .sdot{width:10px;height:10px;border-radius:50%;background:var(--c,#3a4250);flex:0 0 auto}
  .shot .sp{font-size:13px;font-weight:600;flex:0 0 120px;color:var(--c,var(--text))}
  .shot .chip{font-size:11px;color:var(--muted);background:var(--bg-soft);border:1px solid var(--border);
    border-radius:999px;padding:2px 9px}
  .shot .badges{margin-left:auto;display:flex;gap:6px}
  .shot .bdg{font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-radius:5px;padding:2px 7px;font-weight:700}
  .bdg.hero{color:#bccbff;background:var(--accent-soft);border:1px solid var(--accent-bd)}
  .bdg.short{color:var(--ok);background:rgba(94,196,140,.1);border:1px solid rgba(94,196,140,.4)}
  .bdg.cap{color:var(--warn);background:rgba(239,191,79,.08);border:1px dashed rgba(239,191,79,.45)}

  /* Phase 2 — 3D stage player */
  .stage3d{margin:6px 0 14px}
  .s3d-canvas{position:relative;width:100%;aspect-ratio:16/9;background:#0a0c10;border:1px solid var(--border);
    border-radius:var(--radius-sm);overflow:hidden}
  .s3d-canvas canvas{display:block;width:100%!important;height:100%!important}
  .s3d-crop{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
    aspect-ratio:9/16;height:100%;border-left:1px dashed rgba(255,255,255,.22);
    border-right:1px dashed rgba(255,255,255,.22);pointer-events:none}
  .s3d-caption{position:absolute;left:14px;right:14px;bottom:12px;background:rgba(8,10,14,.74);
    backdrop-filter:blur(3px);border:1px solid var(--border);border-radius:10px;padding:9px 13px;
    font-size:14px;line-height:1.45;color:var(--text);opacity:0;transform:translateY(6px);transition:.2s;max-height:38%;overflow:hidden}
  .s3d-caption.on{opacity:1;transform:none}
  .s3d-caption .ritual{color:var(--warn);font-style:italic}
  .s3d-shot{position:absolute;top:10px;left:12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);background:rgba(8,10,14,.6);border:1px solid var(--border);border-radius:6px;padding:3px 8px}
  .s3d-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;
    color:var(--muted);font-size:13.5px;background:rgba(8,10,14,.35)}
  .s3d-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.28);border-top-color:var(--accent);
    border-radius:50%;display:inline-block;animation:sp .7s linear infinite}
  .s3d-controls{display:flex;align-items:center;gap:11px;margin-top:10px}
  .s3d-btn{appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);
    background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:8px 14px;transition:.15s}
  .s3d-btn:hover{border-color:var(--accent-bd);color:#fff}
  .s3d-play{color:#0b0d11;background:linear-gradient(180deg,#a9bcff,#7b97ff);border:0}
  .s3d-progress{flex:1;height:5px;border-radius:3px;background:var(--bg-soft);overflow:hidden}
  .s3d-progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .25s}
  .s3d-seg{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--faint);min-width:74px;text-align:right}

  #err{display:none;margin-top:16px;background:rgba(226,117,111,.1);border:1px solid rgba(226,117,111,.4);
    color:#f0a39e;border-radius:var(--radius-sm);padding:13px 16px;font-size:14px}
  footer{margin-top:40px;color:var(--faint);font-size:12.5px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo" id="logo"></div>
    </div>
    <div class="pill" id="prov"><span class="dot"></span>checking provider…</div>
  </header>
  <p class="tag">AI Debate Showrunner · lock the argument → lock the audio → stage the scene. <b style="color:var(--muted)">Phase 2 — audio &amp; staging.</b></p>

  <div class="card" style="margin-top:18px">
    <label class="lbl" for="topic">Debate topic</label>
    <input type="text" id="topic" placeholder="Type a proposition, or pick a starter below…" value="Pineapple belongs on pizza" />
    <div class="chips" id="starters"></div>

    <div class="grid">
      <div>
        <span class="lbl">Protagonist stance</span>
        <div class="seg" id="stance">
          <button data-v="for" class="on">For</button>
          <button data-v="against">Against</button>
        </div>
      </div>
      <div>
        <span class="lbl">Challengers</span>
        <div class="stepper">
          <button id="ch-minus">–</button><b id="ch-val">3</b><button id="ch-plus">+</button>
        </div>
      </div>
      <div>
        <div class="rangerow"><span class="lbl" style="margin:0">Duration</span><b><span id="dur-val">90</span>s</b></div>
        <input type="range" id="dur" min="60" max="120" step="5" value="90" />
      </div>
      <div>
        <span class="lbl">Topic kind</span>
        <div class="seg" id="kind">
          <button data-v="opinion" class="on">Opinion</button>
          <button data-v="factual">Factual</button>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:14px">
      <div style="grid-column:1/-1">
        <label class="lbl" for="tags">Suggested contention tags <span style="text-transform:none;letter-spacing:0">(optional, comma-separated)</span></label>
        <input type="text" id="tags" placeholder="e.g. texture, tradition, culinary-innovation" />
      </div>
    </div>

    <div class="runbar">
      <button class="run" id="run">Run debate</button>
      <span class="hint" id="seedhint">seed 0 · deterministic</span>
      <input type="number" id="seed" value="0" min="0" style="width:90px;margin-left:auto" title="determinism seed" />
    </div>
    <div id="err"></div>
  </div>

  <div id="results"></div>

  <footer>You Vs Many · the locked transcript is the pivotal artifact every downstream stage inherits.</footer>
</div>

<script src="config.js"></script>
<script>
const PALETTE = ["#f0997b","#5dcaa5","#d4537e","#efbf4f","#85b7eb"];
const ACCENT = "#7b97ff", MOD = "#8a93a3";

// Configure a separate backend with:
//   frontend/index.html?api=https://your-api.example.com
//   window.YVM_API_BASE = "https://your-api.example.com"
//   localStorage.setItem("YVM_API_BASE", "https://your-api.example.com")
const API_BASE = (() => {
  const params = new URLSearchParams(location.search);
  const configured = params.get("api") || window.YVM_API_BASE || localStorage.getItem("YVM_API_BASE");
  if(configured) return configured.replace(/\/+$/, "");
  const local = location.protocol === "file:" || ["localhost","127.0.0.1",""].includes(location.hostname);
  return local ? "http://127.0.0.1:8000" : "";
})();
const api = path => API_BASE + path;

// ---- brand logo: YOU VS MANY with a dotted-spiral O ----
(function(){
  const dots = [];
  const rings = [[0,1,5.5],[1,8,5],[2,14,4],[3,12,2.6]];
  for(const [ri,count,r] of rings){
    const rad = ri*7.0;
    if(count===1){ dots.push(`<circle cx="0" cy="0" r="${r}" fill="#f2f5ff"/>`); continue; }
    for(let i=0;i<count;i++){
      const a = (i/count)*Math.PI*2 + ri*0.5;
      const x=(Math.cos(a)*rad).toFixed(1), y=(Math.sin(a)*rad).toFixed(1);
      const op = (1-ri*0.16).toFixed(2);
      dots.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="#cfd6e6" opacity="${op}"/>`);
    }
  }
  const o = `<svg width="34" height="34" viewBox="-32 -32 64 64" aria-label="O">${dots.join("")}</svg>`;
  document.getElementById("logo").innerHTML =
    `<span>Y</span>${o}<span>U</span><span class="vs">VS</span><span>MANY</span>`;
})();

const STARTERS = [
  {p:"Pineapple belongs on pizza", kind:"opinion", tags:["texture","tradition","culinary-innovation"]},
  {p:"Morning people live better than night owls", kind:"opinion", tags:["productivity","health","social-rhythm"]},
  {p:"Cats make better pets than dogs", kind:"opinion", tags:["independence","affection","maintenance"]},
  {p:"Qwen3 is a decisive upgrade over Qwen2", kind:"factual", tags:["reasoning","multimodality","efficiency"]},
  {p:"HappyHorse is the better video route than Wan", kind:"factual", tags:["identity-fidelity","motion-preservation","cost"]},
];
const $ = s => document.querySelector(s);

(function renderStarters(){
  const box = $("#starters");
  STARTERS.forEach(s=>{
    const c = document.createElement("div");
    c.className = "chip" + (s.kind==="factual"?" factual":"");
    c.innerHTML = `${s.p}<span class="k">${s.kind}</span>`;
    c.onclick = ()=>{
      $("#topic").value = s.p;
      $("#tags").value = s.tags.join(", ");
      setSeg("kind", s.kind);
    };
    box.appendChild(c);
  });
})();

// segmented controls
function setSeg(id,v){ document.querySelectorAll(`#${id} button`).forEach(b=>b.classList.toggle("on", b.dataset.v===v)); }
function getSeg(id){ return $(`#${id} button.on`).dataset.v; }
["stance","kind"].forEach(id=>document.querySelectorAll(`#${id} button`).forEach(b=>b.onclick=()=>setSeg(id,b.dataset.v)));

// stepper + slider + seed
let nch = 3;
$("#ch-minus").onclick=()=>{nch=Math.max(1,nch-1);$("#ch-val").textContent=nch};
$("#ch-plus").onclick =()=>{nch=Math.min(5,nch+1);$("#ch-val").textContent=nch};
$("#dur").oninput=e=>$("#dur-val").textContent=e.target.value;
$("#seed").oninput=e=>$("#seedhint").textContent=`seed ${e.target.value||0} · deterministic`;

// provider badge
fetch(api("/health")).then(r=>r.json()).then(h=>{
  const p=$("#prov");
  const live = h.provider==="qwen";
  p.classList.toggle("live", live);
  p.innerHTML = `<span class="dot"></span>provider <b>${h.provider}</b>${live?` · ${h.model}`:""}`;
}).catch(()=>{ $("#prov").innerHTML='<span class="dot"></span>provider unknown'; });

// ---- run ----
$("#run").onclick = async ()=>{
  const topic = $("#topic").value.trim();
  if(!topic){ showErr("Enter a topic first."); return; }
  const tags = $("#tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  const body = {
    brief:{
      topic,
      protagonist_position:getSeg("stance"),
      target_duration_s:parseInt($("#dur").value,10),
      num_challengers:nch,
      topic_kind:getSeg("kind"),
      seed:parseInt($("#seed").value||"0",10),
    },
    suggested_tags: tags.length?tags:null,
  };
  setLoading(true); hideErr();
  try{
    const r = await fetch(api("/episodes/run"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok){ showErr((d&&d.detail)?d.detail:`Request failed (${r.status})`); setLoading(false); return; }
    render(d);
  }catch(e){ showErr("Network error: "+e.message); }
  setLoading(false);
};
function setLoading(on){
  const b=$("#run");
  b.disabled=on;
  b.innerHTML = on ? `<span class="spin"></span>Running pipeline…` : "Run debate";
}
function showErr(m){ const e=$("#err"); e.textContent=m; e.style.display="block"; }
function hideErr(){ $("#err").style.display="none"; }

// ---- render results ----
function render(d){
  const colorFor = {};
  let ci=0;
  d.cast.forEach(c=>{
    if(c.role==="protagonist") colorFor[c.character_id]=ACCENT;
    else if(c.role==="moderator") colorFor[c.character_id]=MOD;
    else colorFor[c.character_id]=PALETTE[ci++ % PALETTE.length];
  });
  const initials = n => n.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const pct = v => Math.round((v||0)*100);

  const m = d.metrics||{};
  const approved = d.approved;
  const out = [];

  out.push(`<div class="statusrow">
    <span class="badge state">${d.state}</span>
    <span class="badge ${approved?'ok':'no'}">${approved?'✓ approved':'not approved'}</span>
    <span class="badge mono">${d.episode_id}</span>
    <span class="badge mono">${m.turns||d.turns.length} turns · ${d.duration_s}s</span>
  </div>`);

  out.push(`<div class="metrics">
    ${metric("Contention uniqueness", pct(m.contention_uniqueness)+"%", m.contention_uniqueness)}
    ${metric("Repetition", pct(m.repetition)+"%", m.repetition, true)}
    ${metric("Persona adherence", pct(m.persona_adherence)+"%", m.persona_adherence)}
    ${metricPlain("Distinct speakers", m.distinct_speakers ?? d.cast.length)}
    ${metricPlain("Duration in target", m.duration_in_target?"Yes":"No", m.duration_in_target?'var(--ok)':'var(--warn)')}
  </div>`);

  // cast
  out.push(`<h2 class="sec">Cast</h2><div class="cast">`);
  d.cast.forEach(c=>{
    out.push(`<div class="pc" style="--c:${colorFor[c.character_id]}">
      <div class="role">${c.role}${c.stance?` · ${c.stance}`:""}</div>
      <div class="nm">${esc(c.display_name)}</div>
      <span class="ct">${esc(c.contention_tag)}</span>
      <div class="cc">${esc(c.core_contention||"")}</div>
    </div>`);
  });
  out.push(`</div>`);

  // transcript
  out.push(`<h2 class="sec">Transcript</h2>`);
  let claimNo = 0;
  d.turns.forEach(t=>{
    const col = colorFor[t.speaker_id]||MOD;
    const role = (d.cast.find(c=>c.character_id===t.speaker_id)||{}).role;

    // Surrounded ritual beats: a claim card opens each duel, the gavel ends it.
    if(t.scene_cue==="claim_card"){
      claimNo++;
      out.push(`<div class="claimcard">
        <div class="ix">Claim ${claimNo} · <span class="who">${esc(t.speaker_name)}</span></div>
        <div class="ctxt">${esc(t.text)}</div>
      </div>`);
      return;
    }
    if(t.scene_cue==="voted_out"){
      // Non-spoken ritual caption: no host voice, just the on-screen gavel beat.
      out.push(`<div class="votedout"><span class="seatline"></span>
        <span class="ritual">${esc(t.text)}</span>
        <span class="seatline"></span></div>`);
      return;
    }

    const side = role==="protagonist" ? "right" : role==="moderator" ? "center" : "left";
    const tagChip = t.contention_tag ? `<span class="ct">${esc(t.contention_tag)}</span>` : "";
    const av = side==="center" ? "" :
      `<div class="av" style="--c:${col}">${initials(t.speaker_name)}</div>`;
    out.push(`<div class="turn ${side}">
      ${av}
      <div class="bubble" style="--c:${col}">
        <div class="b-top"><span class="who">${esc(t.speaker_name)}</span>${tagChip}</div>
        <div class="b-txt">${esc(t.text)}</div>
        <div class="b-foot"><span>${t.turn_id}</span><span>${t.start_s.toFixed(1)}s</span><span>${t.state}</span><span>${esc(t.scene_cue)}</span></div>
      </div>
    </div>`);
  });

  // highlights
  if(d.highlights && d.highlights.length){
    out.push(`<h2 class="sec">Highlight candidates</h2>`);
    d.highlights.forEach(h=>{
      const sc = h.score && typeof h.score.total!=="undefined" ? h.score.total
               : (h.score ? scoreTotal(h.score) : 0);
      out.push(`<div class="hl">
        <span class="rng">${h.start_turn_id} → ${h.end_turn_id}</span>
        <span class="htag">${esc(h.contention_tag||"—")}</span>
        <span class="rng">${(h.end_s-h.start_s).toFixed(1)}s</span>
        <span class="hscore"><div class="bar"><i style="width:${Math.round(sc*100)}%"></i></div><b>${sc.toFixed(2)}</b></span>
      </div>`);
    });
  }

  // scene manifest (Phase 2 — staging + master audio timeline)
  if(d.scene){
    const sc = d.scene;
    const total = sc.total_duration_s || sc.segments.reduce((a,s)=>a+(s.end_s-s.start_s),0) || 1;
    const nameOf = cid => (d.cast.find(c=>c.character_id===cid)||{}).display_name || cid;
    const colOf = cid => cid==="caption" ? MOD : (colorFor[cid]||MOD);

    out.push(`<h2 class="sec">Scene manifest · staging</h2>`);
    // Live 3D stage: rectangular table, 3 challengers vs the lone protagonist,
    // capsule characters, camera cuts + voices driven by the manifest.
    out.push(`<div id="stage3d" class="stage3d"></div>`);
    const tpl = sc.scene_template;
    if(tpl){
      out.push(`<div class="setcard">
        <div class="setname">🎬 ${esc(tpl.display_name)} <span class="mono">${esc(tpl.asset_url)}</span></div>
        <div class="setenv">${esc(tpl.environment||"")}</div>
      </div>`);
    }
    out.push(`<div class="report">
      <span>segments <b>${sc.segments.length}</b></span>
      <span>audio cues <b>${sc.audio.length}</b></span>
      <span>timeline <b>${total.toFixed(1)}s</b></span>
      <span>9:16 crop-safe <b>${sc.crop_safe_9x16?"yes":"no"}</b></span>
      <span>TTS voices <b>${Object.keys(sc.voice_map||{}).length}</b></span>
    </div>`);

    // voice assignment
    out.push(`<div class="voices">` + Object.entries(sc.voice_map||{}).map(([cid,v])=>
      `<span class="voice" style="--c:${colOf(cid)}">${esc(nameOf(cid))} → <b>${esc(v)}</b></span>`
    ).join("") + `</div>`);

    // top-down stage layout (Three.js world space): x → left/right, z → depth.
    const xs = sc.stage.marks.map(m=>m.position.x);
    const minX = Math.min(-1.6,...xs), maxX = Math.max(1.6,...xs);
    const px = x => 8 + ((x-minX)/((maxX-minX)||1))*84;        // 8%..92%
    const py = z => 14 + ((z-(-0.5))/2.5)*64;                  // back(top)..front(bottom)
    out.push(`<div class="stage">` + sc.stage.marks.map(m=>{
      const init = esc(nameOf(m.character_id).split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase());
      return `<div class="mark" style="left:${px(m.position.x).toFixed(1)}%;top:${py(m.position.z).toFixed(1)}%">
        <span class="dot" style="--c:${colOf(m.character_id)}">${init}</span>
        <span class="ml">${esc(nameOf(m.character_id))}</span>
      </div>`;
    }).join("") + `<span class="cam-label">▲ camera / wide master</span></div>`);

    // master audio timeline — block width ∝ spoken duration, colour by speaker.
    out.push(`<div class="timeline">` + sc.segments.map(s=>{
      const w = ((s.end_s-s.start_s)/total*100).toFixed(3);
      const cap = s.speaker_id==="caption";
      return `<div class="blk${cap?" cap":""}" title="${s.segment_id} · ${esc(nameOf(s.speaker_id))} · ${(s.end_s-s.start_s).toFixed(1)}s"
        style="width:${w}%;background:${colOf(s.speaker_id)}"></div>`;
    }).join("") + `</div>`);

    // shot list
    sc.segments.forEach(s=>{
      const cap = s.speaker_id==="caption";
      const badges = [
        s.visual_priority==="hero" ? `<span class="bdg hero">hero</span>` : "",
        s.short_candidate ? `<span class="bdg short">short</span>` : "",
        cap ? `<span class="bdg cap">caption</span>` : "",
      ].join("");
      out.push(`<div class="shot">
        <span class="sid">${s.segment_id} · ${s.start_s.toFixed(1)}s</span>
        <span class="sdot" style="--c:${colOf(s.speaker_id)}"></span>
        <span class="sp" style="--c:${colOf(s.speaker_id)}">${esc(cap?"— caption —":nameOf(s.speaker_id))}</span>
        <span class="chip">${esc(s.camera.shot)}</span>
        <span class="chip">${esc(s.animation_tag)}</span>
        <div class="badges">${badges}</div>
      </div>`);
    });
  }

  // run report
  const rr = d.run_report||{};
  out.push(`<h2 class="sec">Run report</h2>
    <div class="report">
      <span>provider <b>${esc(rr.provider||"?")}</b></span>
      <span>model <b class="mono">${esc(rr.model||"?")}</b></span>
      <span>LLM calls <b>${rr.llm_calls??"–"}</b></span>
      <span>tokens <b>${(rr.input_tokens||0)}↑ ${(rr.output_tokens||0)}↓</b></span>
      <span>retries <b>${rr.retries??0}</b></span>
    </div>`);

  const R = $("#results");
  R.innerHTML = `<div class="card">${out.join("")}</div>`;
  R.style.display="block";

  // Mount the live 3D stage from the manifest (module defines window.YVM3D).
  if(window.YVM3D && d.scene){
    window.YVM3D.show({
      scene: d.scene,
      cast: d.cast,
      colorFor: id => parseInt(String(colorFor[id]||"#888888").slice(1),16),
      nameFor: id => (d.cast.find(c=>c.character_id===id)||{}).display_name || id,
    });
  }

  R.scrollIntoView({behavior:"smooth",block:"start"});
}

const WEIGHTS={hook:.25,conflict:.20,clarity:.15,novelty:.15,emotion:.10,self_containment:.10,visual_potential:.05};
function scoreTotal(s){ let b=0; for(const k in WEIGHTS) b+=(s[k]||0)*WEIGHTS[k]; return Math.max(0,b-(s.penalty||0)); }

function metric(label,val,frac,invert){
  const w = Math.round((frac||0)*100);
  return `<div class="metric"><div class="m-l">${label}</div><div class="m-v">${val}</div>
    <div class="bar"><i style="width:${w}%;background:${invert?(w>50?'var(--warn)':'var(--ok)'):'var(--accent)'}"></i></div></div>`;
}
function metricPlain(label,val,color){
  return `<div class="metric"><div class="m-l">${label}</div><div class="m-v small" style="${color?`color:${color}`:''}">${val}</div></div>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
</script>
<script type="module" src="scene3d.js"></script>
</body>
</html>
